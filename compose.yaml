name: compass-survey-bot

services:
  app:
    image: ${APP_IMAGE}
    container_name: compass-app
    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "127.0.0.1:8000:8000"

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 256M

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - default
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      - "traefik.http.routers.compass.rule=Host(`compassbot.alisrv.com`)"
      - "traefik.http.routers.compass.entrypoints=websecure"
      - "traefik.http.routers.compass.tls=true"
      - "traefik.http.routers.compass.tls.certresolver=letsencrypt"

      - "traefik.http.routers.compass.middlewares=security-headers@file,compression@file,rate-limit@file"

      - "traefik.http.services.compass.loadbalancer.server.port=8000"

  postgres:
    image: postgres:17
    container_name: compass-postgres
    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 512M

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - default

volumes:
  postgres_data:

networks:
  proxy:
    external: true
