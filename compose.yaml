name: compass-survey-bot

services:
  postgres:
    image: postgres:17
    container_name: compass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: compass
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: compass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
