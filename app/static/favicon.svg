<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 128 128"
>
    <defs>
        <radialGradient id="background" cx="50%" cy="35%" r="75%">
            <stop offset="0%" stop-color="#351507"/>
            <stop offset="55%" stop-color="#111315"/>
            <stop offset="100%" stop-color="#050607"/>
        </radialGradient>

        <linearGradient id="helmet" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="60%" stop-color="#e5e7eb"/>
            <stop offset="100%" stop-color="#9ca3af"/>
        </linearGradient>

        <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e5e7eb"/>
            <stop offset="100%" stop-color="#4b5563"/>
        </linearGradient>

        <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffb020"/>
            <stop offset="100%" stop-color="#ff5a00"/>
        </linearGradient>

        <filter id="orangeGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow
                dx="0"
                dy="4"
                stdDeviation="5"
                flood-color="#000000"
                flood-opacity="0.65"
            />
        </filter>
    </defs>

    <!-- Фон -->
    <rect
        width="128"
        height="128"
        rx="28"
        fill="url(#background)"
    />

    <!-- Декоративные линии -->
    <g
        fill="none"
        stroke="#f97316"
        stroke-width="1.5"
        opacity="0.55"
    >
        <path d="M-8 25 C18 16 24 -2 34 -14"/>
        <path d="M-8 36 C23 24 32 2 44 -14"/>
        <path d="M91 142 C99 119 113 105 142 96"/>
        <path d="M80 142 C90 112 109 94 142 85"/>
    </g>

    <!-- Искры -->
    <g fill="#ff7a00" filter="url(#orangeGlow)">
        <circle cx="25" cy="38" r="1.2"/>
        <circle cx="103" cy="30" r="1"/>
        <circle cx="108" cy="63" r="1.4"/>
        <circle cx="19" cy="76" r="1"/>
        <circle cx="98" cy="91" r="0.9"/>
    </g>

    <!-- Антенна -->
    <rect
        x="61"
        y="15"
        width="6"
        height="17"
        rx="3"
        fill="#25282c"
    />

    <circle
        cx="64"
        cy="14"
        r="8"
        fill="url(#orange)"
        stroke="#ffd08a"
        stroke-width="1.5"
        filter="url(#orangeGlow)"
    />

    <!-- Тело -->
    <path
        d="M31 104
           C34 87 45 80 64 80
           C83 80 94 87 97 104
           L101 119
           H27
           Z"
        fill="url(#body)"
        filter="url(#shadow)"
    />

    <!-- Голова -->
    <rect
        x="22"
        y="29"
        width="84"
        height="63"
        rx="31"
        fill="url(#helmet)"
        stroke="#f7d9c3"
        stroke-width="2"
        filter="url(#shadow)"
    />

    <!-- Уши -->
    <rect
        x="16"
        y="49"
        width="13"
        height="29"
        rx="6.5"
        fill="url(#helmet)"
        stroke="#f97316"
        stroke-width="1"
    />

    <rect
        x="99"
        y="49"
        width="13"
        height="29"
        rx="6.5"
        fill="url(#helmet)"
        stroke="#f97316"
        stroke-width="1"
    />

    <!-- Экран лица -->
    <rect
        x="30"
        y="37"
        width="68"
        height="47"
        rx="22"
        fill="#050607"
        stroke="#6b7280"
        stroke-width="2"
    />

    <!-- Блик -->
    <path
        d="M38 43
           C48 37 64 36 79 39
           C65 41 52 45 41 53
           C37 56 34 50 38 43Z"
        fill="#ffffff"
        opacity="0.13"
    />

    <!-- Глаза -->
    <rect
        x="43"
        y="57"
        width="17"
        height="7"
        rx="3.5"
        fill="url(#orange)"
        filter="url(#orangeGlow)"
    />

    <rect
        x="68"
        y="57"
        width="17"
        height="7"
        rx="3.5"
        fill="url(#orange)"
        filter="url(#orangeGlow)"
    />
</svg>
