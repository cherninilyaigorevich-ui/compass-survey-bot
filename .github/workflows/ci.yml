name: CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name compass-postgres-test \
            -e POSTGRES_DB=compass_test \
            -e POSTGRES_USER=compass_test \
            -e POSTGRES_PASSWORD=test_password \
            -p 5432:5432 \
            postgres:17

      - name: Wait for PostgreSQL
        run: |
          for attempt in $(seq 1 30); do
            if docker exec compass-postgres-test \
              pg_isready \
              -U compass_test \
              -d compass_test; then
              echo "PostgreSQL is ready"
              exit 0
            fi

            echo "Waiting for PostgreSQL: ${attempt}/30"
            sleep 2
          done

          echo "PostgreSQL did not become ready"
          docker logs compass-postgres-test
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Run migrations and tests
        env:
          POSTGRES_DB: compass_test
          POSTGRES_USER: compass_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: |
          alembic upgrade head
          pytest

  build:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/compass-survey-bot:latest
            ghcr.io/${{ github.repository_owner }}/compass-survey-bot:${{ github.sha }}

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy production image
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            /opt/compass-survey-bot/scripts/deploy.sh \
              ghcr.io/${{ github.repository_owner }}/compass-survey-bot:${{ github.sha }}
