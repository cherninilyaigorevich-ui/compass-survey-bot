name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    permissions:
      contents: read
      packages: write

  test:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v5


      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name compass-postgres-test \
            -e POSTGRES_DB=compass_test \
            -e POSTGRES_USER=compass_test \
            -e POSTGRES_PASSWORD=test_password \
            -p 5432:5432 \
            postgres:17


      - name: Wait PostgreSQL
        run: |
          sleep 10


      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Lint with Ruff
        run: |
          ruff check .


      - name: Run migrations and tests
        env:
          POSTGRES_DB: compass_test
          POSTGRES_USER: compass_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

        run: |
          alembic upgrade head
          pytest


      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/compass-survey-bot:latest
            ghcr.io/${{ github.repository_owner }}/compass-survey-bot:${{ github.sha }}
