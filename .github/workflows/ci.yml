name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  test:

    runs-on: ubuntu-latest


    services:

      postgres:

        image: postgres:17

        env:
          POSTGRES_DB: compass_test
          POSTGRES_USER: compass_test
          POSTGRES_PASSWORD: test_password

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready -U compass_test -d compass_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Lint with Ruff
        run: |
          ruff check .


      - name: Run tests
        env:
          POSTGRES_DB: compass_test
          POSTGRES_USER: compass_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

        run: |
          alembic upgrade head
          pytest


      - name: Build Docker image
        run: |
          docker build -t compass-survey-bot:test .
